name: 不動産ニュース 生成（LINE送信は無効）

# 公式LINEへの自動送信は停止中。
# このワークフローは手動実行のみで、記事の取得と所感の生成結果を
# ログに出力するだけ（LINEへの送信は行わない）。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate (no LINE send)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_daily.py --test
